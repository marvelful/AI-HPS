name: Deploy VPS

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    branches:
      - master
    types:
      - completed

jobs:
  deploy:
    name: Deploy to DigitalOcean VPS
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release archive
        run: git archive --format=tar.gz --output=aihps-release.tgz HEAD

      - name: Upload release archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: aihps-release.tgz
          target: /tmp

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            mkdir -p /opt/aihps
            rm -rf /tmp/aihps-deploy
            mkdir -p /tmp/aihps-deploy
            tar -xzf /tmp/aihps-release.tgz -C /tmp/aihps-deploy scripts/deploy-vps.sh
            APP_DIR=/opt/aihps RELEASE_ARCHIVE=/tmp/aihps-release.tgz bash /tmp/aihps-deploy/scripts/deploy-vps.sh
