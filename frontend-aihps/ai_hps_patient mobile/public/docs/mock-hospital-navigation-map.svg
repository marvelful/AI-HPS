<svg xmlns="http://www.w3.org/2000/svg" width="960" height="680" viewBox="0 0 960 680" role="img" aria-label="AI-HPS simulated hospital building navigation map">
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .campus { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .path { fill: none; stroke: #64748b; stroke-width: 16; stroke-linecap: round; stroke-linejoin: round; opacity: .45; }
      .walk { fill: none; stroke: #0f766e; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 10 8; }
      .building { stroke: #1e293b; stroke-width: 2; }
      .roof { fill: rgba(15, 23, 42, .08); }
      .central { fill: #fef3c7; }
      .left { fill: #dbeafe; }
      .right { fill: #dcfce7; }
      .critical { fill: #fee2e2; }
      .support { fill: #e0e7ff; }
      .entry { fill: #fde68a; }
      .label { font: 700 13px Arial, sans-serif; fill: #0f172a; }
      .small { font: 11px Arial, sans-serif; fill: #475569; }
      .title { font: 700 24px Arial, sans-serif; fill: #0f172a; }
      .note { font: 12px Arial, sans-serif; fill: #475569; }
      .zone { font: 700 12px Arial, sans-serif; fill: #334155; letter-spacing: .5px; }
      .pin { fill: #0f766e; }
    </style>
  </defs>

  <rect class="bg" width="960" height="680"/>
  <text class="title" x="34" y="40">AI-HPS Hospital Building Navigation Mockup</text>
  <text class="note" x="34" y="62">Simulated hospital layout for the patient navigation demonstration.</text>

  <rect class="campus" x="34" y="86" width="892" height="548" rx="18"/>
  <rect x="64" y="112" width="832" height="486" rx="12" fill="#eef6f7" stroke="#dbeafe"/>

  <path class="path" d="M121 552 L206 512 L292 445 L402 374"/>
  <path class="path" d="M402 374 L402 291 L486 291"/>
  <path class="path" d="M402 291 L278 250 L196 225"/>
  <path class="path" d="M486 291 L598 256 L746 217"/>
  <path class="path" d="M486 291 L612 340 L780 394"/>
  <path class="path" d="M402 374 L265 382 L170 420"/>

  <path class="walk" d="M121 552 L206 512 L292 445 L402 374 L402 291 L278 250 L196 225"/>
  <path class="walk" d="M402 291 L486 291 L598 256 L746 217"/>
  <path class="walk" d="M486 291 L612 340 L780 394"/>

  <text class="zone" x="84" y="143">LEFT CLINICAL WING</text>
  <text class="zone" x="634" y="143">RIGHT CLINICAL WING</text>
  <text class="zone" x="375" y="190">CENTRAL SERVICES</text>

