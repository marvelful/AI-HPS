    <polygon class="roof" points="410,446 428,428 558,428 540,446"/>
    <text class="label" x="438" y="478">Pharmacy</text>
    <text class="small" x="438" y="495">Medicines</text>
  </g>

  <g>
    <circle class="pin" cx="121" cy="552" r="7"/>
    <circle class="pin" cx="402" cy="374" r="7"/>
    <circle class="pin" cx="486" cy="291" r="7"/>
    <text class="small" x="76" y="617">Dashed green lines show the simulated paths used by the chatbot.</text>
