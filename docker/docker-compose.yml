version: "3.9"

services:

  redis:
    image: redis:7.2-alpine
    container_name: aihps_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: aihps_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: aihps
      RABBITMQ_DEFAULT_PASS: aihps_dev_pass
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: aihps_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    # host.docker.internal resolves to the Windows host automatically on Docker Desktop
    # The extra_hosts entry below is a no-op on Windows but needed on Linux Docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - rabbitmq
    restart: unless-stopped

volumes:
  rabbitmq_data:
  redis_data:
