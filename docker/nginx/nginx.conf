worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile       on;
    keepalive_timeout 65;

    # ── Rate-limit zones ──────────────────────────────────────────────────────
    # Login: 5 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    # General API: 20 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;

    # ── Upstream services running natively on Windows host ────────────────────
    upstream svc02_auth       { server host.docker.internal:8010; }
    upstream svc03_procedures { server host.docker.internal:8011; }
    upstream svc06_audit      { server host.docker.internal:8014; }
    upstream svc07_kb         { server host.docker.internal:8015; }

    server {
        listen 80;
        server_name localhost;

        # ── Internal JWT validation sub-request ───────────────────────────────
        # Nginx calls this before every protected route.
        # SVC-02 returns 200 (valid) or 401 (invalid/missing).
        location = /_internal/auth/validate {
            internal;
            proxy_pass              http://svc02_auth/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length    "";
            proxy_set_header        X-Original-URI    $request_uri;
            proxy_set_header        X-Original-Method $request_method;
            proxy_set_header        Authorization     $http_authorization;
        }

        # ── Public gateway health ──────────────────────────────────────────────
        location = /health {
            return 200 '{"status":"ok","gateway":"SVC-01 Nginx"}';
            add_header Content-Type application/json;
        }

        # ── 401 / 429 error handlers ──────────────────────────────────────────
        location @unauthorized {
            default_type application/json;
            return 401 '{"detail":"Authentication required — include Authorization: Bearer <token>"}';
        }
        location @rate_limited {
            default_type application/json;
            return 429 '{"detail":"Too many requests — slow down"}';
        }

        # ── SVC-02  Auth ──────────────────────────────────────────────────────

        # Login is public but rate-limited (5/min)
        location = /api/auth/login {
            limit_req        zone=login burst=2 nodelay;
            limit_req_status 429;
            error_page       429 @rate_limited;
            proxy_pass       http://svc02_auth/auth/login;
            proxy_set_header Host        $host;
            proxy_set_header X-Real-IP   $remote_addr;
        }

        # All other auth endpoints require a valid JWT
        location /api/auth/ {
            auth_request     /_internal/auth/validate;
            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            error_page       401 @unauthorized;
            limit_req        zone=api burst=10 nodelay;
            limit_req_status 429;
            error_page       429 @rate_limited;

            rewrite ^/api/auth/(.*) /auth/$1 break;
            proxy_pass       http://svc02_auth;
            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header X-User-ID     $auth_user_id;
            proxy_set_header X-User-Role   $auth_user_role;
            proxy_set_header Authorization $http_authorization;
        }

        # ── SVC-03  Procedure Management ──────────────────────────────────────
        location /api/procedures/ {
            auth_request     /_internal/auth/validate;
            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            auth_request_set $auth_user_role $upstream_http_x_user_role;
            error_page       401 @unauthorized;
            limit_req        zone=api burst=15 nodelay;
            limit_req_status 429;

            rewrite ^/api/procedures/(.*) /$1 break;
            proxy_pass       http://svc03_procedures;
            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header X-User-ID     $auth_user_id;
            proxy_set_header X-User-Role   $auth_user_role;
            proxy_set_header Authorization $http_authorization;
        }

        # ── SVC-06  Audit ─────────────────────────────────────────────────────
        location /api/audit/ {
            auth_request     /_internal/auth/validate;
            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            error_page       401 @unauthorized;
            limit_req        zone=api burst=5 nodelay;
            limit_req_status 429;

            rewrite ^/api/audit/(.*) /$1 break;
            proxy_pass       http://svc06_audit;
            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }

        # ── SVC-07  KB Sync ───────────────────────────────────────────────────
        location /api/kb/ {
            auth_request     /_internal/auth/validate;
            auth_request_set $auth_user_id   $upstream_http_x_user_id;
            error_page       401 @unauthorized;
            limit_req        zone=api burst=5 nodelay;
            limit_req_status 429;

            rewrite ^/api/kb/(.*) /$1 break;
            proxy_pass       http://svc07_kb;
            proxy_set_header Host          $host;
            proxy_set_header X-Real-IP     $remote_addr;
            proxy_set_header Authorization $http_authorization;
        }
    }
}
